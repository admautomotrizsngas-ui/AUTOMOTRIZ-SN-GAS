<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Placas - SN'GAS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 42px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4CAF50;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .tagline {
            font-size: 18px;
            color: #ecf0f1;
            margin-top: 10px;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
        }

        .back-home-btn {
            display: inline-block;
            margin-top: 20px;
            background: #FFC107;
            color: #0d47a1;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s;
        }
        .back-home-btn:hover {
            transform: scale(1.05);
        }
    </style>
    <style>
        .quick-access-container {
            text-align: center;
            display: flex; /* Para poner botones uno al lado del otro */
            justify-content: center; /* Centra los botones */
            gap: 15px; /* Espacio entre botones */
            flex-wrap: wrap; /* Permite que los botones pasen a la siguiente línea */
            margin-top: 20px;
        }
        .quick-access-btn {
            background: #4CAF50;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            /* Estilos para centrar el contenido */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .quick-access-btn.hidden {
            display: none; /* Clase para ocultar botones que no coinciden */
        }
        .quick-access-btn .placa {
            font-size: 14px;
        }
        .quick-access-btn:hover { background: #66BB6A; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Directorio de Placas</h1>
            <p class="tagline">Encuentra rápidamente la información de un vehículo.</p>
        </header>

        <div class="quick-access-container">
            <!-- Los botones se generarán dinámicamente con JavaScript -->
        </div>

        <footer>
            <a href="index.html" class="back-home-btn"><i class="fas fa-arrow-left"></i> Volver a la pagina inicio</a>
        </footer>
    </div>

    <script>
        let sociosData = [
            { placa: "ABC-123", nombre: "NUEVO SOCIO", id: "1001" },
            { placa: "ABC-234", nombre: "NUEVO SOCIO", id: "1002" },
            { placa: "BPK-176", nombre: "NUEVO SOCIO", id: "1003" },
            { placa: "CBV-585", nombre: "NUEVO SOCIO", id: "1004" },
            { placa: "CFM-502", nombre: "NUEVO SOCIO", id: "1005" },
            { placa: "BEK-063", nombre: "NUEVO SOCIO", id: "1006" },
            { placa: "BTZ-643", nombre: "NUEVO SOCIO", id: "1007" },
            { placa: "V8Y-630", nombre: "NUEVO SOCIO", id: "1008" },
            { placa: "CLW-268", nombre: "NUEVO SOCIO", id: "1009" },
            { placa: "AVP-045", nombre: "NUEVO SOCIO", id: "1010" },
            { placa: "Y2F-119", nombre: "NUEVO SOCIO", id: "1011" },
            { placa: "CPG-301", nombre: "NUEVO SOCIO", id: "1012" },
            { placa: "BYY-691", nombre: "NUEVO SOCIO", id: "1013" },
            { placa: "CML-567", nombre: "NUEVO SOCIO", id: "1014" },
            { placa: "CVY-080", nombre: "NUEVO SOCIO", id: "1015" },
            { placa: "BRF-005", nombre: "NUEVO SOCIO", id: "1016" },
            { placa: "AYY-822", nombre: "NUEVO SOCIO", id: "1017" },
            { placa: "CFR-445", nombre: "NUEVO SOCIO", id: "1018" },
            { placa: "CHS-132", nombre: "NUEVO SOCIO", id: "1019" },
            { placa: "BUU-336", nombre: "NUEVO SOCIO", id: "1020" },
            { placa: "BVH-343", nombre: "NUEVO SOCIO", id: "1021" },
            { placa: "CNH-208", nombre: "NUEVO SOCIO", id: "1022" },
            { placa: "BAB-131", nombre: "NUEVO SOCIO", id: "1023" },
            { placa: "BZF-491", nombre: "NUEVO SOCIO", id: "1024" },
            { placa: "AUX-196", nombre: "NUEVO SOCIO", id: "1025" },
            { placa: "BTB-220", nombre: "NUEVO SOCIO", id: "1026" },
            { placa: "CMW-359", nombre: "NUEVO SOCIO", id: "1027" },
            { placa: "CBV-549", nombre: "NUEVO SOCIO", id: "1028" },
            { placa: "BVN-032", nombre: "NUEVO SOCIO", id: "1029" }
        ];

        const container = document.querySelector('.quick-access-container');

        function renderButtons(socios, searchTerm) {
            container.innerHTML = ''; // Limpiar contenedor
            if (socios.length === 0 && searchTerm.trim() !== '') {
                container.innerHTML = `<p style="color: #ccc;">No se encontraron resultados para "${searchTerm}".</p>`;
                return;
            }
            if (socios.length === 0 && searchTerm.trim() === '') {
                 container.innerHTML = '<p style="color: #ccc;">No hay socios para mostrar. Comience una búsqueda en la página principal.</p>';
                 return;
            }

            socios.forEach(socio => {
                const btn = document.createElement('button');
                btn.className = 'quick-access-btn';
                btn.onclick = () => window.location.href = `${socio.placa}.html`;
                btn.innerHTML = `
                    <i class="fas fa-star"></i>
                    <span class="placa">${socio.placa}</span>
                `;
                container.appendChild(btn);
            });
        }

        function handleSearch(searchTerm) {
            const upperSearchTerm = searchTerm.trim().toUpperCase();
            
            const filteredSocios = sociosData.filter(socio => {
                if (upperSearchTerm === '') return true;
                const searchData = `${socio.placa} ${socio.nombre} ${socio.id}`.toUpperCase();
                return searchData.includes(upperSearchTerm);
            });

            // Si hay exactamente un resultado y la búsqueda no está vacía, redirigir
            if (filteredSocios.length === 1) {
                window.location.href = `${filteredSocios[0].placa}.html`;
                return;
            }

            renderButtons(filteredSocios, searchTerm);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const placa = urlParams.get('placa') || '';
            handleSearch(placa);
        });
    </script>
</body>
</html>
